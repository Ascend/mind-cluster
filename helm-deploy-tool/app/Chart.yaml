apiVersion: v2
name: mindcluster-deploy-tool
description: MindCluster Deploy Tool
type: application
# The version of Chart itself, when the template, default configuration, or dependencies of Chart change, it is usually necessary to increment the version.
# Helm uses version field as the unique identifier for the Chart, which is used for installation, upgrade, rollback, and indexing.
# If the version is not updated, helm upgrade will consider the Chart unchanged and will not apply the new content.
version: 26.1.0
# The version of the deployed application.
# This field is primarily for user reference, and Helm itself does not rely on it for version comparison or upgrade decision-making
appVersion: "26.1.0"

dependencies:
  - name: clusterd
    version: 26.1.0
    repository: ""
    condition: clusterd.enabled
  - name: noded
    version: 26.1.0
    repository: ""
    condition: noded.enabled
  - name: npu-exporter
    version: 26.1.0
    repository: ""
    condition: npu-exporter.enabled
  - name: ascend-operator
    version: 26.1.0
    repository: ""
    condition: ascend-operator.enabled
  - name: ascend-for-volcano
    version: 26.1.0
    repository: ""
    condition: ascend-for-volcano.enabled
  - name: infer-operator
    version: 26.1.0
    repository: ""
    condition: infer-operator.enabled
  - name: ascend-device-plugin
    version: 26.1.0
    repository: ""
    condition: ascend-device-plugin.enabled
  - name: k8s-rdma-shared-dev-plugin
    version: 26.1.0
    repository: ""
    condition: k8s-rdma-shared-dev-plugin.enabled

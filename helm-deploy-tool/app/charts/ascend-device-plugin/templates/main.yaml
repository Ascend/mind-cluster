{{- if and .Values.is310P1usoc (not (eq (kindOf .Values.is310P1usoc) "bool")) -}}
  {{- fail (printf "is310P1usoc must be a boolean value, got %s: %v" (kindOf .Values.is310P1usoc) .Values.is310P1usoc) -}}
{{- end -}}

{{- if and .Values.volcanoType (not (eq (kindOf .Values.volcanoType) "bool")) -}}
  {{- fail (printf "volcanoType must be a boolean value, got %s: %v" (kindOf .Values.volcanoType) .Values.volcanoType) -}}
{{- end -}}

{{- $is310P1usoc := .Values.is310P1usoc -}}
{{- $volcanoType := .Values.volcanoType -}}
{{- $dirKey := "default" -}}
{{- if and $is310P1usoc $volcanoType -}}
  {{- $dirKey = "310P-1usoc-volcano" -}}
{{- else if and $is310P1usoc (not $volcanoType) -}}
  {{- $dirKey = "310P-1usoc" -}}
{{- else if and (not $is310P1usoc) $volcanoType -}}
  {{- $dirKey = "volcano" -}}
{{- end -}}

{{- $filePath := printf "yamls/%s/**.yaml" $dirKey -}}

{{- $files := .Files.Glob $filePath -}}
{{- if not $files -}}
  {{- fail (printf "No files found matching pattern: %s" $filePath) -}}
{{- end -}}

{{- $currentScope := . }}
{{- range $path, $_ := .Files.Glob $filePath }}
  {{- with $currentScope }}
    {{- $content := $.Files.Get $path -}}
    {{- tpl $content $ }}
---
  {{- end }}
{{- end }}

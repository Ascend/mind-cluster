apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-test-deployment-2pod-16npu
  labels:
    ring-controller.atlas: ascend-910b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: default-test-deployment-2pod-16npu
  template:
    metadata:
      labels:
        app: default-test-deployment-2pod-16npu
        framework: pytorch
        tor-affinity: "null"
        fault-scheduling: force
        fault-retry-times: "3"
        pod-rescheduling: "on"
        deploy-name: "default-test-deployment-2pod-16npu"
        ring-controller.atlas: ascend-910b
      annotations:
        sp-block: "32"
        huawei.com/recover_policy_path: "pod"
    spec:
      schedulerName: volcano
      nodeSelector:
        host-arch: huawei-arm
        accelerator-type: module-a3-16-super-pod
      containers:
        - name: ascend
          image: ubuntu:22.04
          imagePullPolicy: IfNotPresent
          env:
            - name: XDL_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: ASCEND_VISIBLE_DEVICES
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['huawei.com/Ascend910']
          command:
            - /bin/bash
            - -c
          args:
            - "sleep 9999;"
          ports:
            - containerPort: 22222
              name: ascendjob-port
          resources:
            limits:
              huawei.com/Ascend910: 16
            requests:
              huawei.com/Ascend910: 16
          volumeMounts:
            - name: localtime
              mountPath: /etc/localtime
      volumes:
        - name: localtime
          hostPath:
            path: /etc/localtime
